[core]
    engine = pg
    plan_file = sqitch.plan
    top_dir = .

[engine "pg"]
    # Password is intentionally omitted from version control. Supply it via
    # PGPASSWORD, ~/.pgpass, or a local .env (see .env.example) when running Sqitch.
    target = db:pg://exam@localhost:5432/practice_exam

[add]
    with_verify = yes
