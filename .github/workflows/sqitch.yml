name: sqitch

# Round-trip every migration on a throwaway PostgreSQL database:
#   deploy -> verify -> deploy (idempotent) -> full revert -> deploy again
# This proves that every deploy applies, every verify actually asserts,
# the --requires dependency chain is consistent, and every revert cleanly
# undoes its deploy (leaving no orphaned objects behind).

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint migration conventions (CLAUDE.md)
        run: ./scripts/lint-migrations.sh

  round-trip:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: exam
          POSTGRES_PASSWORD: exam
          POSTGRES_DB: practice_exam
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U exam -d practice_exam"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TARGET: db:pg://exam:exam@localhost:5432/practice_exam
      # Sqitch / psql pick this up so no password ends up on the command line.
      PGPASSWORD: exam

    steps:
      - uses: actions/checkout@v4

      - name: Install Sqitch + PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y sqitch libdbd-pg-perl postgresql-client

      - name: Deploy
        run: sqitch deploy -t "$TARGET" --verify

      - name: Verify
        run: sqitch verify -t "$TARGET"

      - name: Re-deploy (must be a no-op / idempotent)
        run: sqitch deploy -t "$TARGET"

      - name: Revert everything
        run: sqitch revert -y -t "$TARGET"

      - name: Assert no user objects remain after revert
        run: |
          # Sqitch keeps its own registry in the separate "sqitch" schema, so a
          # clean revert should leave the "public" schema with no tables, views,
          # sequences, or functions.
          leftovers=$(psql -h localhost -U exam -d practice_exam -tAc "
            SELECT n.nspname || '.' || c.relname
              FROM pg_class c JOIN pg_namespace n ON n.oid = c.relnamespace
             WHERE n.nspname = 'public' AND c.relkind IN ('r','v','S')
            UNION ALL
            SELECT n.nspname || '.' || p.proname || '()'
              FROM pg_proc p JOIN pg_namespace n ON n.oid = p.pronamespace
             WHERE n.nspname = 'public';")
          if [ -n "$leftovers" ]; then
            echo "::error::Revert left objects behind:"
            echo "$leftovers"
            exit 1
          fi
          echo "Clean: no user objects remain after full revert."

      - name: Deploy again from scratch
        run: sqitch deploy -t "$TARGET" --verify

      - name: Load bulk seed and check row counts
        run: |
          psql -h localhost -U exam -d practice_exam \
            -v ON_ERROR_STOP=1 -f seed/0020_20192_ldm_2019_fall.sql
          psql -h localhost -U exam -d practice_exam -tAc "
            DO \$\$
            BEGIN
              ASSERT (SELECT count(*) FROM questions) = 120, 'expected 120 questions';
              ASSERT (SELECT count(*) FROM answers)   = 600, 'expected 600 answers';
              ASSERT (SELECT count(*) FROM answers WHERE is_correct) = 120, 'expected 120 correct answers';
            END \$\$;"
          echo "Seed loaded: 120 questions / 600 answers / 120 correct."
